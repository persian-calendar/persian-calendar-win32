name: Build EXE

permissions:
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request:

jobs:
  upload-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache LLVM Installer
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: LLVM-22.1.8-win64.exe
          key: llvm-installer-22.1.8
      - name: Download LLVM Installer
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          curl -L -o LLVM-22.1.8-win64.exe https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.8/LLVM-22.1.8-win64.exe
      - name: Install LLVM
        shell: pwsh
        run: |
          $p = Start-Process -FilePath ".\LLVM-22.1.8-win64.exe" -ArgumentList "/S" -PassThru
          $p.WaitForExit()
      - name: Run the tests
        shell: cmd
        run: |
          "C:\\Program Files\\LLVM\\bin\\clang" test.cc -m32 -fno-exceptions -D_CRT_SECURE_NO_WARNINGS -o test.exe && test.exe

      # Don't bump the version to support older machines with no SEE4.2 and Windows XP
      - name: Cache Crinkler
        id: cache-crinkler
        uses: actions/cache@v4
        with:
          path: crinkler23.zip
          key: crinkler-v2.3
      - name: Download Crinkler
        if: steps.cache-crinkler.outputs.cache-hit != 'true'
        run: |
          curl -L -o crinkler23.zip https://github.com/runestubbe/Crinkler/releases/download/v2.3/crinkler23.zip
      - name: Extract Crinkler
        shell: pwsh
        run: |
          Expand-Archive crinkler23.zip -DestinationPath crinkler_tmp -Force
          Get-ChildItem -Recurse crinkler_tmp -Filter Crinkler.exe | Where-Object { $_.FullName -like '*Win32*' } | Select-Object -First 1 | Copy-Item -Destination .
          Remove-Item crinkler_tmp -Recurse -Force

      - name: Build EXE
        shell: cmd
        run: |
          build.bat

      - name: Publish rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          files: persian-calendar.exe
