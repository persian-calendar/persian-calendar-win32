name: Build EXE

permissions:
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request:

jobs:
  upload-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache LLVM Installer
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: LLVM-22.1.8-win64.exe
          key: llvm-installer-22.1.8
      - name: Download LLVM Installer
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          curl -L -o LLVM-22.1.8-win64.exe https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.8/LLVM-22.1.8-win64.exe
      - name: Install LLVM
        shell: pwsh
        run: |
          $p = Start-Process -FilePath ".\LLVM-22.1.8-win64.exe" -ArgumentList "/S" -PassThru
          $p.WaitForExit()
      - name: Run the tests
        shell: cmd
        run: |
          "C:\\Program Files\\LLVM\\bin\\clang" test.cc -m32 -fno-exceptions -D_CRT_SECURE_NO_WARNINGS -o test.exe && test.exe

      # - name: Cache Crinkler
      #   id: cache-crinkler
      #   uses: actions/cache@v4
      #   with:
      #     path: crinkler30a.zip
      #     key: crinkler-v3.0a
      # - name: Download Crinkler
      #   if: steps.cache-crinkler.outputs.cache-hit != 'true'
      #   run: |
      #     curl -L -o crinkler30a.zip https://github.com/runestubbe/Crinkler/releases/download/v3.0a/crinkler30a.zip
      # - name: Extract Crinkler
      #   shell: pwsh
      #   run: |
      #     Expand-Archive crinkler30a.zip -DestinationPath crinkler_tmp -Force
      #     Get-ChildItem -Recurse crinkler_tmp -Filter Crinkler.exe | Where-Object { $_.FullName -like '*Win32*' } | Select-Object -First 1 | Copy-Item -Destination .
      #     Remove-Item crinkler_tmp -Recurse -Force

      - name: Build EXE
        shell: cmd
        run: |
          build.bat

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pefile
          python postlink.py

      - name: Publish rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          files: persian-calendar.exe
